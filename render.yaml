# render.yaml
services:
  - type: web
    name: tomato-ai-admin-backend
    runtime: node
    repo: https://github.com/JayRdev09/Admin_Backend.git
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
    buildCommand: npm install
    startCommand: npm start